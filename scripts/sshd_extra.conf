# sshd_extra.conf
# These lines are appended to /etc/ssh/sshd_config by the Dockerfile.
#
# ForceCommand: every SSH login (including shellinabox's internal SSH connection)
# runs through session-wrapper.sh instead of the user's default shell.
# This is how command logging is injected without modifying user .bashrc files.

ForceCommand /usr/local/bin/session-wrapper.sh

# Only allow the intern accounts to log in
AllowUsers intern1 intern2 intern3

# SSH is only for shellinabox → localhost connections; disable TCP forwarding
AllowTcpForwarding no
X11Forwarding no
PermitTunnel no